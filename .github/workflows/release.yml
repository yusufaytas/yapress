name: Release Package

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version bump to apply before publishing
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Sync release base with npm
        run: node scripts/sync-release-base.mjs

      - name: Bump version
        run: npm version ${{ inputs.version_bump }} --no-git-tag-version

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Validate content
        run: npm run validate:content

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit and tag release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "release: v${VERSION}"
          git tag -a "v${VERSION}" -m "release: v${VERSION}"
          git push origin HEAD:${GITHUB_REF_NAME} --follow-tags
